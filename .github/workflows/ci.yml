name: Esteira de Integração Contínua (CI)

on:
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    services:

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sqa_social_media
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Rodar Testes de Unidade/Integração (API Java)
        run: |
          cd api
          chmod +x mvnw
          ./mvnw test

      - name: Rodar Testes de Unidade/Integração (Client Next.js)
        run: |
          cd client
          npm ci
          npm test -- --watchAll=false --passWithNoTests

      - name: Instalar dependências da pasta /tests (Playwright)
        run: |
          cd tests
          npm ci
          npx playwright install --with-deps

      - name: Inicializar Aplicações (API e Client)
        run: |
          cd api
          ./mvnw spring-boot:run &
          cd ../client
          npm run dev &
          sleep 15 # Aguarda as aplicações estabilizarem no ar

      - name: Executar Testes E2E e API (Playwright)
        run: |
          cd tests
          npx playwright test